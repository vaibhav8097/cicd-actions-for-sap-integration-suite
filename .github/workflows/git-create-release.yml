name: (Admin) BTP Release Manager

on:
  workflow_dispatch:
    inputs:
      base-ref:
        description: "GIT Base Reference"
        required: true
        type: string   
      target-ref:
        description: "GIT Target Reference"
        required: true
        type: string  
      perform-deploy:
        description: "Perform deploy after calculation (true/false)"
        required: true
        type: choice
        options:
          - "false"
          - "true"
      target-env:
        description: "Target BTP Environment"
        required: false
        type: choice
        options:  #!cicd:target-env-options!
          - ""

permissions:
  contents: write

jobs:
  initialize:
    name: Authorize & Read Environment Variables for ${{ inputs.target-env }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.target-env }}
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
      cx-iflow-exclusions: ${{ steps.export.outputs.cx-iflow-exclusions }}
      cx-repository: ${{ steps.export.outputs.cx-repository }}
      cx-repository-ref: ${{ steps.export.outputs.cx-repository-ref }}
    steps:
      # ─── Token resolution (GitHub App preferred, PAT fallback) ───
      - name: Resolve CICD org
        id: cicd-org
        shell: bash
        env:
          ORGREPO: ${{ vars.GIT_CICD_ORGREPO }}
          CICD_REF: ${{ vars.GIT_CICD_REF }}
        run: |
          [ -z "$CICD_REF" ] && echo "🛑 GIT_CICD_REF is not set. Set this variable to the cicd-actions ref to use (e.g. v1)." && exit 1
          echo "owner=${ORGREPO%%/*}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token — CICD org
        id: app-token-cicd
        if: ${{ vars.GIT_CICD_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_CICD_APP_ID }}
          private-key: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
          owner: ${{ steps.cicd-org.outputs.owner }}

      - name: Resolve CICD token
        id: cicd-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token-cicd.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No CICD token: set GIT_CICD_APP_ID + GIT_CICD_APP_PRIVATE_KEY, or set GIT_CICD_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Checkout cicd-actions repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GIT_CICD_ORGREPO }}
          ref: ${{ vars.GIT_CICD_REF }}
          path: cicd-btp-insuite
          token: ${{ steps.cicd-token.outputs.token }}

      - name: Generate GitHub App token — consumer org
        id: app-token-org
        if: ${{ vars.GIT_GITHUB_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Resolve org token
        id: org-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token-org.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_ORG_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No org token: set GIT_GITHUB_APP_ID + GIT_GITHUB_APP_PRIVATE_KEY, or set GIT_ORG_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check team authorization
        uses: ./cicd-btp-insuite/.github/actions/check-team-authorization
        with:
          team-slug: ${{ vars.BTP_ADMIN_TEAM_SLUG }}
          github-token: ${{ steps.org-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT
          echo "cx-iflow-exclusions=${{ vars.CX_IFLOW_EXCLUSIONS }}" >> $GITHUB_OUTPUT
          echo "cx-repository=${{ vars.CX_REPOSITORY }}" >> $GITHUB_OUTPUT
          echo "cx-repository-ref=${{ vars.CX_REPOSITORY_REF || 'main' }}" >> $GITHUB_OUTPUT
        
  analyze-changes:
    needs: [initialize]
    name: Analyze Changes
    uses: SAP/cicd-actions-for-sap-integration-suite/.github/workflows/analyze-changes.yml@v1
    with:
      workflow-ref: v1
      target-env: ${{ github.event.inputs.target-env }}
      base-ref: ${{ github.event.inputs.base-ref }}
      target-ref: ${{ github.event.inputs.target-ref }}
      perform-deploy: ${{ github.event.inputs.perform-deploy }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}   
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}

  btp-execute-deployment:
    needs: [initialize, analyze-changes]
    name: Execute Deployment
    if: ${{ github.event.inputs.perform-deploy == 'true' }}
    uses: SAP/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload.yml@v1
    with:
      workflow-ref: v1
      target-env: ${{ github.event.inputs.target-env }}
      source-ref: ${{ github.event.inputs.target-ref }}
      integrationpackages-upload-ids: ${{ needs.analyze-changes.outputs.package_upload_csv_content }}
      integrationpackages-delete-ids: ${{ needs.analyze-changes.outputs.package_delete_csv_content }}
      partnerdirectory-upload-ids: ${{ needs.analyze-changes.outputs.pid_upload_csv_content }}
      partnerdirectory-delete-ids: ${{ needs.analyze-changes.outputs.pid_delete_csv_content }}
      base-ref: ${{ github.event.inputs.base-ref }}
      cx-iflow-exclusions: ${{ needs.initialize.outputs.cx-iflow-exclusions }}
      cx-repository: ${{ needs.initialize.outputs.cx-repository }}
      cx-repository-ref: ${{ needs.initialize.outputs.cx-repository-ref }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
