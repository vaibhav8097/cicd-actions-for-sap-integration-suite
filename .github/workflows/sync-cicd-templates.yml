# 1.1.1 - 2026-05-12 - GitHub App authentication with cross-org token support (O.Weng)
# 1.2.0 - 2026-05-18 - Scenario-based template filtering with install/remove workflow inputs (O.Weng)
# 1.3.0 - 2026-05-19 - Scenario lifecycle management: dynamic dropdowns, orphan auto-removal and stale file cleanup (O.Weng)
# 1.3.2 - 2026-05-20 - Mandatory validation for GIT_CICD_REF and BTP_ADMIN_TEAM_SLUG (O.Weng)
# 1.3.3 - 2026-05-21 - Graceful self-sync fallback to raw download; split GitHub App into CICD reader and consumer bot; add [skip ci] to sync commit (O.Weng)
# 1.3.6 - 2026-05-22 - Checkout CICD actions repo at source-ref before authorization check, removing hardcoded @v1 (O.Weng)
# 1.4.0 - 2026-05-27 - Split monolithic sync step into discrete named steps; dynamic target-env injection via discover-environments (O.Weng)
